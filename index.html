<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аренда мебели и техники</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #8888aa;
      --green: #4ade80;
      --red: #f87171;
      --border: rgba(255,255,255,0.07);
      --radius: 14px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-bottom: 1px solid var(--border);
      padding: 48px 24px 40px;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p.tagline {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto 28px;
    }

    .contact-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s;
    }

    .contact-btn:hover {
      background: rgba(108,99,255,0.2);
      border-color: var(--accent);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,19,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
    }

    .nav-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 16px 28px;
      max-width: 1200px;
      margin: 0 auto;
    }

    #nav-cats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
    }

    .nav-lang select,
    .nav-currency select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      min-width: 4.5rem;
      text-align: center;
    }

    .nav-lang select:hover,
    .nav-lang select:focus,
    .nav-currency select:hover,
    .nav-currency select:focus {
      border-color: var(--accent);
      outline: none;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      padding: 14px 16px;
      font-size: 0.9rem;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    nav a:hover, nav a.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section {
      margin-bottom: 60px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .section-icon {
      font-size: 1.8rem;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
    }

    .section-count {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 100px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(108,99,255,0.35);
      box-shadow: 0 8px 32px rgba(108,99,255,0.12);
    }

    .card.unavailable {
      opacity: 0.55;
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--muted);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .card-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent2);
    }

    .card-price .card-price-suffix {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--muted);
    }

    .badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    .badge-available {
      background: rgba(74,222,128,0.12);
      color: var(--green);
      border: 1px solid rgba(74,222,128,0.25);
    }

    .badge-unavailable {
      background: rgba(248,113,113,0.12);
      color: var(--red);
      border: 1px solid rgba(248,113,113,0.25);
    }

    .error-msg {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 1.1rem;
    }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      header { padding: 32px 16px 28px; }
      main { padding: 24px 16px 60px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header id="site-header">
  <h1 id="site-name">Загрузка...</h1>
  <p class="tagline" id="site-tagline"></p>
  <div class="contact-bar" id="contact-bar"></div>
</header>

<nav id="nav">
  <div class="nav-row">
    <div id="nav-cats"></div>
    <div class="nav-lang">
      <select id="lang-select" aria-label="Язык интерфейса">
        <option value="ru">RU</option>
        <option value="en">EN</option>
      </select>
    </div>
    <div class="nav-currency">
      <select id="currency-select" aria-label="Валюта отображения цен">
        <option value="rub">₽</option>
        <option value="vnd">₫</option>
        <option value="usd">$</option>
      </select>
    </div>
  </div>
</nav>

<main id="main">
  <div class="loading">Загружаем каталог...</div>
</main>

<footer id="footer">
  <span id="footer-name"></span>
</footer>

<script>
  const CURRENCY_STORAGE_KEY = 'rent_monitor_currency';
  const CURRENCY_CODES = ['rub', 'vnd', 'usd'];
  const LANG_STORAGE_KEY = 'rent_monitor_lang';
  const LANG_CODES = ['ru', 'en'];

  const UI_STRINGS = {
    ru: {
      loading: 'Загружаем каталог...',
      siteLoading: 'Загрузка...',
      perDay: '/ сутки',
      available: 'Доступно',
      unavailable: 'Занято',
      itemsCount: n => `${n} поз.`,
      currencyAria: 'Валюта отображения цен',
      langAria: 'Язык интерфейса',
      errorBody: 'Не удалось загрузить каталог.<br/>Проверьте, что файл <code>catalog.json</code> находится рядом с <code>index.html</code>.',
      catalogFetchError: 'Не удалось загрузить catalog.json'
    },
    en: {
      loading: 'Loading catalog...',
      siteLoading: 'Loading...',
      perDay: '/ day',
      available: 'Available',
      unavailable: 'Booked',
      itemsCount: n => `${n} item${n === 1 ? '' : 's'}`,
      currencyAria: 'Price display currency',
      langAria: 'Interface language',
      errorBody: 'Could not load the catalog.<br/>Make sure <code>catalog.json</code> is next to <code>index.html</code>.',
      catalogFetchError: 'Failed to load catalog.json'
    }
  };

  let catalogData = null;
  let navScrollObserver = null;

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/"/g, '&quot;');
  }

  function getStoredLang() {
    try {
      const v = localStorage.getItem(LANG_STORAGE_KEY);
      if (v && LANG_CODES.includes(v)) return v;
    } catch (_) {}
    return 'ru';
  }

  function setStoredLang(code) {
    try {
      localStorage.setItem(LANG_STORAGE_KEY, code);
    } catch (_) {}
  }

  function getLang() {
    const sel = document.getElementById('lang-select');
    if (sel && LANG_CODES.includes(sel.value)) return sel.value;
    return getStoredLang();
  }

  function ui() {
    const lang = getLang();
    return UI_STRINGS[lang] || UI_STRINGS.ru;
  }

  function applyNavAria() {
    const u = ui();
    const c = document.getElementById('currency-select');
    const l = document.getElementById('lang-select');
    if (c) c.setAttribute('aria-label', u.currencyAria);
    if (l) l.setAttribute('aria-label', u.langAria);
  }

  function pickLocalized(val, lang) {
    if (val == null) return '';
    if (typeof val === 'string') return val;
    if (typeof val === 'object' && !Array.isArray(val)) {
      return val[lang] || val.ru || val.en || Object.values(val).find(Boolean) || '';
    }
    return String(val);
  }

  function localizeCompany(company, lang) {
    return {
      ...company,
      name: pickLocalized(company.name, lang),
      tagline: pickLocalized(company.tagline, lang)
    };
  }

  function localizeCategories(categories, lang) {
    return categories.map(cat => ({
      ...cat,
      name: pickLocalized(cat.name, lang),
      items: cat.items.map(item => ({
        ...item,
        name: pickLocalized(item.name, lang),
        description: pickLocalized(item.description, lang)
      }))
    }));
  }

  async function loadCatalog() {
    const lang = getStoredLang();
    const errMsg = (UI_STRINGS[lang] || UI_STRINGS.ru).catalogFetchError;
    const res = await fetch('catalog.json');
    if (!res.ok) throw new Error(errMsg);
    return res.json();
  }

  function getStoredCurrency() {
    try {
      const v = localStorage.getItem(CURRENCY_STORAGE_KEY);
      if (v && CURRENCY_CODES.includes(v)) return v;
    } catch (_) {}
    return 'rub';
  }

  function setStoredCurrency(code) {
    try {
      localStorage.setItem(CURRENCY_STORAGE_KEY, code);
    } catch (_) {}
  }

  function formatPrice(currencyCode, value, lang) {
    const n = Number(value);
    const numLoc = lang === 'en' ? 'en-US' : 'ru-RU';
    if (currencyCode === 'rub') {
      return new Intl.NumberFormat(numLoc).format(n) + ' ₽';
    }
    if (currencyCode === 'vnd') {
      const loc = lang === 'en' ? 'en-US' : 'vi-VN';
      return new Intl.NumberFormat(loc).format(Math.round(n)) + ' ₫';
    }
    if (currencyCode === 'usd') {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      }).format(n);
    }
    return String(n);
  }

  function normalizeItemPrices(item) {
    const p = item.price_per_day;
    if (p && typeof p === 'object' && 'rub' in p && 'vnd' in p && 'usd' in p) {
      return { rub: p.rub, vnd: p.vnd, usd: p.usd };
    }
    const legacy = Number(item.price_per_day);
    return { rub: legacy, vnd: legacy, usd: legacy };
  }

  function applyCurrencyToCards() {
    const sel = document.getElementById('currency-select');
    const code = sel ? sel.value : 'rub';
    const lang = getLang();
    document.querySelectorAll('.card-price[data-rub]').forEach(el => {
      const raw = el.getAttribute('data-' + code);
      const num = raw != null ? Number(raw) : NaN;
      const amount = el.querySelector('.card-price-amount');
      if (amount && !Number.isNaN(num)) {
        amount.textContent = formatPrice(code, num, lang);
      }
    });
  }

  function buildContactBar(company) {
    const bar = document.getElementById('contact-bar');
    if (company.phone) {
      const tel = company.phone.replace(/\s/g, '');
      bar.innerHTML += `<a class="contact-btn" href="tel:${tel}">📞 ${escapeHtml(company.phone)}</a>`;
    }
    if (company.telegram) {
      const tg = company.telegram.replace('@', '');
      bar.innerHTML += `<a class="contact-btn" href="https://t.me/${escapeHtml(tg)}" target="_blank">✈️ ${escapeHtml(company.telegram)}</a>`;
    }
    if (company.email) {
      bar.innerHTML += `<a class="contact-btn" href="mailto:${escapeHtml(company.email)}">✉️ ${escapeHtml(company.email)}</a>`;
    }
  }

  function buildNav(categories) {
    const navCats = document.getElementById('nav-cats');
    navCats.innerHTML = categories.map(cat =>
      `<a href="#cat-${escapeHtml(cat.id)}">${cat.icon} ${escapeHtml(cat.name)}</a>`
    ).join('');
  }

  function buildCard(item, categoryIcon, u) {
    const avail = item.available;
    const prices = normalizeItemPrices(item);
    const nameEsc = escapeHtml(item.name);
    const imageHtml = item.image
      ? `<div class="card-image"><img src="${escapeHtml(item.image)}" alt="${nameEsc}" loading="lazy" /></div>`
      : `<div class="card-image">${categoryIcon}</div>`;

    return `
      <div class="card${avail ? '' : ' unavailable'}">
        ${imageHtml}
        <div class="card-body">
          <div class="card-name">${nameEsc}</div>
          <div class="card-desc">${escapeHtml(item.description)}</div>
          <div class="card-footer">
            <div class="card-price" data-rub="${prices.rub}" data-vnd="${prices.vnd}" data-usd="${prices.usd}">
              <span class="card-price-amount"></span> <span class="card-price-suffix">${escapeHtml(u.perDay)}</span>
            </div>
            <span class="badge ${avail ? 'badge-available' : 'badge-unavailable'}">
              ${avail ? escapeHtml(u.available) : escapeHtml(u.unavailable)}
            </span>
          </div>
        </div>
      </div>
    `;
  }

  function buildSections(categories, u) {
    const main = document.getElementById('main');
    main.innerHTML = categories.map(cat => `
      <section class="section" id="cat-${escapeHtml(cat.id)}">
        <div class="section-header">
          <span class="section-icon">${cat.icon}</span>
          <h2 class="section-title">${escapeHtml(cat.name)}</h2>
          <span class="section-count">${escapeHtml(u.itemsCount(cat.items.length))}</span>
        </div>
        <div class="grid">
          ${cat.items.map(item => buildCard(item, cat.icon, u)).join('')}
        </div>
      </section>
    `).join('');
  }

  function activateNavOnScroll() {
    if (navScrollObserver) {
      navScrollObserver.disconnect();
      navScrollObserver = null;
    }
    const links = document.querySelectorAll('nav a');
    const sections = document.querySelectorAll('.section');
    if (!sections.length) return;
    navScrollObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          links.forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === `#${id}`);
          });
        }
      });
    }, { threshold: 0.3 });
    sections.forEach(s => navScrollObserver.observe(s));
  }

  function renderCatalog(data) {
    const lang = getLang();
    document.documentElement.lang = lang;
    const u = ui();
    const co = localizeCompany(data.company, lang);
    const cats = localizeCategories(data.categories, lang);

    document.title = co.name;
    document.getElementById('site-name').textContent = co.name;
    document.getElementById('site-tagline').textContent = co.tagline || '';
    document.getElementById('footer-name').textContent = co.name;

    const bar = document.getElementById('contact-bar');
    bar.innerHTML = '';
    buildContactBar(data.company);

    buildNav(cats);
    buildSections(cats, u);
    applyCurrencyToCards();
    activateNavOnScroll();
  }

  function showError(e) {
    const lang = getLang();
    document.documentElement.lang = lang;
    const u = UI_STRINGS[lang] || UI_STRINGS.ru;
    document.getElementById('main').innerHTML = `
      <div class="error-msg">
        <p style="font-size:2rem;margin-bottom:12px">⚠️</p>
        <p>${u.errorBody}</p>
        <p style="margin-top:8px;font-size:0.8rem;color:#555">${escapeHtml(e.message)}</p>
      </div>
    `;
  }

  function bootstrapShell() {
    const lang = getStoredLang();
    document.documentElement.lang = lang;
    const u = UI_STRINGS[lang] || UI_STRINGS.ru;
    const langSel = document.getElementById('lang-select');
    if (langSel) langSel.value = lang;
    document.getElementById('site-name').textContent = u.siteLoading;
    const loadEl = document.querySelector('#main .loading');
    if (loadEl) loadEl.textContent = u.loading;
    applyNavAria();
  }

  async function init() {
    bootstrapShell();

    document.getElementById('lang-select').addEventListener('change', () => {
      setStoredLang(document.getElementById('lang-select').value);
      applyNavAria();
      if (catalogData) {
        renderCatalog(catalogData);
      }
    });

    try {
      catalogData = await loadCatalog();
      const curSel = document.getElementById('currency-select');
      curSel.value = getStoredCurrency();
      curSel.addEventListener('change', () => {
        setStoredCurrency(curSel.value);
        applyCurrencyToCards();
      });
      renderCatalog(catalogData);
    } catch (e) {
      showError(e);
    }
  }

  init();
</script>
</body>
</html>
