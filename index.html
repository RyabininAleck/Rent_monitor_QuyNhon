<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аренда мебели и техники</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #8888aa;
      --green: #4ade80;
      --red: #f87171;
      --border: rgba(255,255,255,0.07);
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-bottom: 1px solid var(--border);
      padding: 48px 24px 40px;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p.tagline {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto 28px;
    }

    .contact-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s;
    }

    .contact-btn:hover {
      background: rgba(108,99,255,0.2);
      border-color: var(--accent);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,19,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      padding: 14px 16px;
      font-size: 0.9rem;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    nav a:hover, nav a.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section {
      margin-bottom: 60px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .section-icon {
      font-size: 1.8rem;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
    }

    .section-count {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 100px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(108,99,255,0.35);
      box-shadow: 0 8px 32px rgba(108,99,255,0.12);
    }

    .card.unavailable {
      opacity: 0.55;
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--muted);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .card-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent2);
    }

    .card-price span {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--muted);
    }

    .badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    .badge-available {
      background: rgba(74,222,128,0.12);
      color: var(--green);
      border: 1px solid rgba(74,222,128,0.25);
    }

    .badge-unavailable {
      background: rgba(248,113,113,0.12);
      color: var(--red);
      border: 1px solid rgba(248,113,113,0.25);
    }

    .error-msg {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 1.1rem;
    }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      header { padding: 32px 16px 28px; }
      main { padding: 24px 16px 60px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header id="site-header">
  <h1 id="site-name">Загрузка...</h1>
  <p class="tagline" id="site-tagline"></p>
  <div class="contact-bar" id="contact-bar"></div>
</header>

<nav id="nav"></nav>

<main id="main">
  <div class="loading">Загружаем каталог...</div>
</main>

<footer id="footer">
  <span id="footer-name"></span>
</footer>

<script>
  async function loadCatalog() {
    const res = await fetch('catalog.json');
    if (!res.ok) throw new Error('Не удалось загрузить catalog.json');
    return res.json();
  }

  function buildContactBar(company) {
    const bar = document.getElementById('contact-bar');
    if (company.phone) {
      bar.innerHTML += `<a class="contact-btn" href="tel:${company.phone}">📞 ${company.phone}</a>`;
    }
    if (company.telegram) {
      const tg = company.telegram.replace('@', '');
      bar.innerHTML += `<a class="contact-btn" href="https://t.me/${tg}" target="_blank">✈️ ${company.telegram}</a>`;
    }
    if (company.email) {
      bar.innerHTML += `<a class="contact-btn" href="mailto:${company.email}">✉️ ${company.email}</a>`;
    }
  }

  function buildNav(categories) {
    const nav = document.getElementById('nav');
    nav.innerHTML = categories.map(cat =>
      `<a href="#cat-${cat.id}">${cat.icon} ${cat.name}</a>`
    ).join('');
  }

  function buildCard(item, categoryIcon) {
    const avail = item.available;
    const imageHtml = item.image
      ? `<div class="card-image"><img src="${item.image}" alt="${item.name}" loading="lazy" /></div>`
      : `<div class="card-image">${categoryIcon}</div>`;

    return `
      <div class="card${avail ? '' : ' unavailable'}">
        ${imageHtml}
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.description}</div>
          <div class="card-footer">
            <div class="card-price">
              ${item.price_per_day} ${item.currency || '₽'} <span>/ сутки</span>
            </div>
            <span class="badge ${avail ? 'badge-available' : 'badge-unavailable'}">
              ${avail ? 'Доступно' : 'Занято'}
            </span>
          </div>
        </div>
      </div>
    `;
  }

  function buildSections(categories) {
    const main = document.getElementById('main');
    main.innerHTML = categories.map(cat => `
      <section class="section" id="cat-${cat.id}">
        <div class="section-header">
          <span class="section-icon">${cat.icon}</span>
          <h2 class="section-title">${cat.name}</h2>
          <span class="section-count">${cat.items.length} поз.</span>
        </div>
        <div class="grid">
          ${cat.items.map(item => buildCard(item, cat.icon)).join('')}
        </div>
      </section>
    `).join('');
  }

  function activateNavOnScroll() {
    const links = document.querySelectorAll('nav a');
    const sections = document.querySelectorAll('.section');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          links.forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === `#${id}`);
          });
        }
      });
    }, { threshold: 0.3 });
    sections.forEach(s => observer.observe(s));
  }

  async function init() {
    try {
      const data = await loadCatalog();
      const { company, categories } = data;

      document.title = company.name;
      document.getElementById('site-name').textContent = company.name;
      document.getElementById('site-tagline').textContent = company.tagline || '';
      document.getElementById('footer-name').textContent = company.name;

      buildContactBar(company);
      buildNav(categories);
      buildSections(categories);
      activateNavOnScroll();
    } catch (e) {
      document.getElementById('main').innerHTML = `
        <div class="error-msg">
          <p style="font-size:2rem;margin-bottom:12px">⚠️</p>
          <p>Не удалось загрузить каталог.<br/>Проверьте, что файл <code>catalog.json</code> находится рядом с <code>index.html</code>.</p>
          <p style="margin-top:8px;font-size:0.8rem;color:#555">${e.message}</p>
        </div>
      `;
    }
  }

  init();
</script>
</body>
</html>
